<!doctype html><html><head><meta charset="utf-8"><style>
body{margin:0;background:#0a0a0f;color:#e8e8f0;font-family:Consolas,monospace;display:grid;place-items:center;height:100vh}
.term{width:82%;height:66%;border:1px solid #1e1e2a;border-radius:10px;background:#13131a;padding:24px;box-sizing:border-box;overflow:hidden}
.line{opacity:0;animation:show 9s infinite}.l1{animation-delay:.2s}.l2{animation-delay:1.6s}.l3{animation-delay:3s}.l4{animation-delay:4.4s}.l5{animation-delay:5.8s}.l6{animation-delay:7.2s}
@keyframes show{0%,12%{opacity:0;transform:translateY(8px)}18%,88%{opacity:1;transform:translateY(0)}100%{opacity:0}}
b{color:#00ff88}</style></head><body><div class="term">
<div class="line l1">$ npm install -g @btcmaster1000/peermesh-provider</div>
<div class="line l2">$ peermesh-provider</div>
<div class="line l3"><b>Signed in as alice</b></div>
<div class="line l4">Sharing active [1 public, 1 private] - 2 / 2 slots active</div>
<div class="line l5">$ peermesh-provider --status</div>
<div class="line l6"><b>Slot 2: PRIVATE code=191175596 sync=DASHBOARD</b></div>
</div></body></html>
